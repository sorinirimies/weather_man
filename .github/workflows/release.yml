name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Quality gate ──────────────────────────────────────────────────────────
  check:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install system deps (Iced)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  # ── GitHub release with binaries ──────────────────────────────────────────
  release:
    name: Build & publish release
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install system deps (Iced, Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p weatherman -p weatherman-tui

      - name: Package binaries
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          PKG="weatherman-${GITHUB_REF_NAME}-${{ matrix.suffix }}"
          mkdir -p "$PKG"
          cp "$BIN_DIR/weatherman" "$PKG/" 2>/dev/null || true
          cp "$BIN_DIR/weatherman-tui" "$PKG/" 2>/dev/null || true
          cp README.md LICENSE "$PKG/"
          tar -czvf "$PKG.tar.gz" "$PKG"

      - name: Generate release notes (git-cliff)
        if: runner.os == 'Linux'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.os == 'Linux' && 'RELEASE_NOTES.md' || '' }}
          files: |
            weatherman-*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io (core → gui → tui) ───────────────────────────────
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (Iced)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          cargo publish -p weatherman-core
          echo "Waiting for crates.io to index weatherman-core…"
          sleep 45
          cargo publish -p weatherman
          cargo publish -p weatherman-tui
